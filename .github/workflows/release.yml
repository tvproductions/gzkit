# Release workflow — triggers on version tags (vX.Y.Z)
# Builds PyInstaller binaries for Windows/Linux/macOS, creates GitHub Release,
# and optionally publishes to PyPI.
#
# Usage:
#   git tag vX.Y.Z
#   git push origin vX.Y.Z

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # needed to create releases
  id-token: write  # needed for PyPI trusted publishing

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: gz.exe
            pyinstaller-name: gz.exe
          - os: ubuntu-latest
            artifact: gz-linux
            pyinstaller-name: gz
          - os: macos-latest
            artifact: gz-macos
            pyinstaller-name: gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies + PyInstaller
        run: |
          uv sync
          uv add --dev pyinstaller

      - name: Build binary
        run: uv run pyinstaller gz.spec

      - name: Rename artifact (skip if same name)
        shell: bash
        run: |
          if [[ "${{ matrix.pyinstaller-name }}" != "${{ matrix.artifact }}" ]]; then
            mv "dist/${{ matrix.pyinstaller-name }}" "dist/${{ matrix.artifact }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/gz.exe/gz.exe
            artifacts/gz-linux/gz-linux
            artifacts/gz-macos/gz-macos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Verify tag matches package version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(grep -m1 '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')"
          echo "Tag version: $TAG"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Version mismatch — tag v$TAG vs pyproject.toml $PKG_VERSION. Refusing to publish."
            exit 1
          fi

      - name: Build wheel
        run: uv build

      - name: Validate distributions
        run: uv tool run twine check --strict dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
