# Release workflow — triggers on version tags (v0.8.0, v1.0.0, etc.)
# Builds PyInstaller binaries for Windows/Linux/macOS, creates GitHub Release,
# and optionally publishes to PyPI.
#
# Usage:
#   git tag v0.8.0
#   git push origin v0.8.0

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # needed to create releases

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: gz.exe
            pyinstaller-name: gz.exe
          - os: ubuntu-latest
            artifact: gz-linux
            pyinstaller-name: gz
          - os: macos-latest
            artifact: gz-macos
            pyinstaller-name: gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies + PyInstaller
        run: |
          uv sync
          uv add --dev pyinstaller

      - name: Build binary
        run: uv run pyinstaller gz.spec

      - name: Rename artifact
        shell: bash
        run: mv "dist/${{ matrix.pyinstaller-name }}" "dist/${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/gz.exe/gz.exe
            artifacts/gz-linux/gz-linux
            artifacts/gz-macos/gz-macos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Optional: uncomment to publish to PyPI on release.
  # Requires a PyPI API token stored as PYPI_TOKEN in repo secrets.
